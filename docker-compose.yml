services:
  openclaw-api:
    build: ./openclaw-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - API_TOKEN=${API_TOKEN}
    volumes:
      - ${OPENCLAW_HOME}/.openclaw:/root/.openclaw
      - /home/bosscatdog/.npm-global/bin/openclaw:/usr/local/bin/openclaw:ro
      - /home/bosscatdog/.npm-global/bin/mcporter:/usr/local/bin/mcporter:ro

  openclaw-admin:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_IP}:4000
        NEXT_PUBLIC_API_TOKEN: ${API_TOKEN}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - openclaw-api
